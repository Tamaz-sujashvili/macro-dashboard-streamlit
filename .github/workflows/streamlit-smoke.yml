name: streamlit-smoke

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile sources
        run: python -m compileall app.py cli

      - name: Boot Streamlit and probe health endpoint
        run: |
          streamlit run app.py --server.headless true --server.address 127.0.0.1 --server.port 8501 &
          STREAMLIT_PID=$!
          cleanup() {
            kill "${STREAMLIT_PID}" >/dev/null 2>&1 || true
            wait "${STREAMLIT_PID}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8501/_stcore/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "Streamlit health endpoint did not become ready in time." >&2
          exit 1
